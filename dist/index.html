<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booster</title>
    <link rel="stylesheet" href="/event-booster.34df27b5.css">
  </head>
  <body>
    <header class="header">
      <div class="container header__inner">
        <div class="header__logo">
          <img src="/logo.8bb9af93.svg" alt="Event Booster">
        </div>

        <h1 class="header__headline">Find best events<br>around the world</h1>

        <div class="header__controls">
          <div class="header__search">
            <input id="searchInput" type="text" placeholder="Search events..." autocomplete="off">
            <button id="searchBtn">Search</button>
          </div>
          <div class="header__country">
            <select id="countrySelect">
              <option value="">All countries</option>
              <option value="US">USA</option>
              <option value="GB">UK</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="SK">Slovakia</option>
              <option value="UA">Ukraine</option>
            </select>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="container">
        <div class="events-grid" id="eventsGrid"></div>

        <div class="skeleton-grid" id="skeletonGrid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>

        <div class="empty-state hidden" id="emptyState">
          <p>No events found.</p>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>Event Booster © 2026. Powered by Ticketmaster API.</p>
      </div>
    </footer>

    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal" id="modal">
        <img class="modal__avatar" id="modalAvatar" alt="">
        <button class="modal__close" id="modalClose">×</button>

        <div class="modal__content" id="modalContent"></div>

        <div class="modal__more" id="modalMore"></div>
      </div>
    </div>

    <script type="module" src="/event-booster.b828852a.js"></script>
  

</body></html>
